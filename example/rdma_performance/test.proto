syntax="proto2";
option cc_generic_services = true;

package test;

message PerfTestRequest {
      required bool echo_attachment = 1;
      repeated int32 matrix = 2;
      optional int32 matrix_dimension = 3;
      optional int64 processing_complexity = 4;
};

message PerfTestResponse {
      required string cpu_usage = 1;
      optional int64 result_checksum = 2;
      optional uint64 sched_latency_ns = 3; // Server side total scheduling latency from cut_in_msg to ProcessRpcRequest (ns)
      optional uint64 enqueue_prepare_latency_ns = 4; // Server side enqueue prepare latency (ns, from create to enqueue)
      optional uint64 queue_latency_ns = 5; // Server side queue wait latency (ns)
      optional uint64 switch_latency_ns = 6; // Server side context switch latency (ns)
};

service PerfTestService {
      rpc Test(PerfTestRequest) returns (PerfTestResponse);
};
